<!doctype html>
<html>

<head>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./index.js" defer></script>
</head>

<body>
    <div class="bg-blue-400 h-screen">
        <div class="bg-white p-12 w-6/12 mx-auto">
            <h1>localstorage App</h1>
            <form onsubmit="store(event)" class="flex flex-col mt-6 gap-3">
                <input type="text" class="border border-gray-800 p-2 rounded-md" placeholder="key name" name="" id="key">
                <input type="text" class="border border-gray-800 p-2 rounded-md" placeholder="value name" name="" id="value">
            <button class="bg-black hover:bg-gray-700 text-white px-2 rounded-lg " >Store</button>
            </form>
        </div>
    </div>
</body>
