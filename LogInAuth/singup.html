<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="./script/signUp.js" defer></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div
      class="grid md:grid-cols-2 w-11/12 md:w-8/12 bg-white shadow-xl rounded-2xl overflow-hidden"
    >
      <!-- Image Section -->
      <div class="flex flex- md:flex-rows items-center justify-center">
        <img
          class="w-full max-w-md"
          src="./imgs/undraw_authentication_1evl.png"
          alt="not Found"
        />
      </div>

      <!-- Form Section -->
      <div class="p-10">
        <h1 class="text-3xl font-bold text-gray-800">Register Now</h1>
        <p class="text-gray-500 mt-2">Create your account to get started</p>

        <form
          onsubmit="createUser(event)"
          id="Singup-form"
          class="mt-8 space-y-6"
        >
          <!-- name -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-700">Fullname</label>
            <input
              onblur="validation('fullname', 'fullname-error')"
              oninput="validation('fullname', 'fullname-error')"
              id="fullname"
              name="fullname"
              type="name"
              placeholder="Enter your name"
              class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
            <label id="fullname-error" class="text-rose-600 hidden font-medium"
              >please fil Up full Name</label
            >
          </div>
          <!-- Email -->
          <div class="flex flex-col gap-2">
            <label id="fullname-error" class="text-sm font-medium text-gray-700"
              >Email</label
            >
            <input
              onblur="validation('email', 'email-error')"
              oninput="validation('email', 'email-error')"
              id="email"
              name="email"
              type="email"
              placeholder="Enter your email"
              class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
            <label id="email-error" class="text-rose-600 hidden font-medium"
              >please fil Up email</label
            >
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-700">Password</label>
            <div  class="border flex border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
              <input
                onblur="validation('password', 'password-error')"
                oninput="validation('password', 'password-error')"
                id="password"
                name="password"
                type="password"
                placeholder="********"
               class="flex-1 focus:outline-none "
              />
              <button   onclick="showpasswordbtn()"
               type="button" class=" hover:text-green-600 rounded-full" >
               <i id="eye-icon" class="ri-eye-line"></i>
            </button>
            </div>
            <label id="password-error" class="text-rose-600 hidden font-medium"
              >please fil Up password</label
            >
          </div>

          <!-- Button -->
          <button
            id="user-btn"
            class="w-full bg-green-400 hover:bg-gray-900 text-white font-semibold py-2 rounded-lg transition"
          >
            Sing Up
          </button>
        </form>
        <div class="py-2 flex gap-4">
          <label class="font-semibold">I have already user account</label>
          <a
            class="text-green-600 font-semibold hover:underline rounded-lg"
            href="./login.html"
            >Login</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
