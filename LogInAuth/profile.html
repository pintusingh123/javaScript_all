<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.css">
    <script src="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.js"></script>

    <script src="./script/profile.js" defer></script>
  </head>

  <body>
    <div class="bg-gray-600 min-h-screen py-15   px-4">
      <!-- Parent -->
      <div
        class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6 items-stretch"
      >
        <!-- Profile Card -->
        <div
          class="bg-white relative pt-16 pb-6  px-6 sm:px-8 w-full lg:h-fit lg:w-[300px] rounded-2xl gap-2 shadow-lg flex flex-col items-center lg:items-start"
        >
          <!-- Avatar -->
          <img
            class="h-32 w-32 sm:h-36 sm:w-36 rounded-full absolute -top-14 left-1/2 -translate-x-1/2 border-4 border-white object-cover"
            src="./imgs/avatar.jfif"
            alt="avatar not fount"
          />

          <!-- Content -->
          <div class="mt-16 text-center lg:text-left w-full">
            <div class="mb-1">
              <span class="text-medium font-semibold text-gray-900 capitalizetracking-wide">User Name:</span>
              <span id="user-name" class="text-base font-semibold text-blue-800 ml-2"></span>
            </div>
            <div class="mb-4">
              <span class="text-medium font-semibold text-gray-900 capitalize tracking-wide">User Email:</span>
              <span id="user-email" class="text-base font-semibold text-blue-800 ml-2"></span>
            </div>

            <button
              type="button"
              class="relative bg-[#3F5174] w-full lg:w-auto px-5 rounded-lg font-semibold hover:bg-black text-white transition"
            >
              <i class="ri-download-line mr-1"></i>
              Choose Image
              <input
                id="file-input"
                onchange="uploadImg()"
                type="file"
                accept="image/*"
                class="absolute top-0 left-0 h-full w-full opacity-0"
              />
            </button>

            <button
              onclick="loadCropper()"
              class="bg-rose-800 mt-4 w-full lg:w-fit px-5 py-2 rounded-lg font-semibold hover:bg-black text-white transition"
            >
              <i class="ri-crop-line mr-1"></i>
              Crop Image
            </button>
            <button
              onclick="DownloadImg()"
              id="download-button"
              class=" hidden bg-green-800 mt-4 w-full lg:w-fit px-5 py-2 rounded-lg font-semibold hover:bg-black text-white transition"
            >
              <i class="ri-upload-line mr-1"></i>
              Download
            </button>

            <button
              onclick="logOut()"
              class="bg-[#3F5174] mt-4 w-full lg:w-fit px-5 py-2 rounded-lg font-semibold hover:bg-black text-white transition"
            >
              <i class="ri-logout-circle-r-line mr-1"></i> Logout
            </button>
          </div>
        </div>

        <!-- Right Content -->
        <div
          class="bg-white rounded-2xl flex-1 p-4 sm:p-6 md:p-3 shadow-lg flex items-center justify-center"
        >
          <img
            id="edit-img"
            src="https://via.placeholder.com/300x200?text=Demo+Image"
            alt="please choose a img click on Choose image button"
            class="w-full h-full max-h-[400px] object-cover rounded-xl"
          />
        </div>
      </div>
    </div>
  </body>
</html>
